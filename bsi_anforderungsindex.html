<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSI IT-Grundschutz – Anforderungsindex 2023</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161922;
    --bg3: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8b91a8;
    --text3: #5a6079;
    --accent: #4f8ef7;
    --accent2: #7eb8ff;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #f04444;
    --teal: #2dd4bf;
    --purple: #a78bfa;
    --pink: #f472b6;
    --font: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* HEADER */
  .site-header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .meta { font-size: 12px; color: var(--text3); margin-left: auto; }

  .stats-row {
    display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1rem;
  }
  .stat { font-size: 12px; color: var(--text2); }
  .stat b { color: var(--text); font-weight: 600; font-size: 16px; margin-right: 4px; }

  /* SEARCH */
  .search-wrap { position: relative; max-width: 480px; }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 16px 10px 42px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); font-size: 15px; pointer-events: none;
  }
  .clear-btn {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 18px; padding: 2px;
    display: none;
  }
  .clear-btn.visible { display: block; }

  /* FILTERS */
  .filters-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
  }
  .cat-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent2); }
  .cat-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* MAIN LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 180px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    overflow-y: auto;
    position: sticky;
    top: 180px;
    height: calc(100vh - 180px);
    padding: 1rem 0;
  }
  .sidebar-cat {
    padding: 0.25rem 0;
  }
  .sidebar-cat-header {
    padding: 6px 1.25rem;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 0.5rem;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 1.25rem;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .sidebar-item:hover { background: var(--bg3); }
  .sidebar-item.active {
    background: rgba(79,142,247,0.1);
    border-left-color: var(--accent);
  }
  .sidebar-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    min-width: 70px;
  }
  .sidebar-name {
    font-size: 12px;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* MAIN CONTENT */
  .main { padding: 1.5rem 2rem; overflow-y: auto; }

  .results-info {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1.25rem;
    min-height: 18px;
  }

  .baustein-block {
    margin-bottom: 1.25rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .baustein-block:hover { border-color: var(--border2); }

  .bst-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg2);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .bst-header:hover { background: var(--bg3); }

  .bst-cat-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .bst-code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    flex-shrink: 0;
  }
  .bst-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .bst-count {
    font-size: 11px;
    color: var(--text3);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .bst-toggle {
    color: var(--text3);
    font-size: 16px;
    transition: transform 0.2s;
    flex-shrink: 0;
    width: 18px;
  }
  .baustein-block.open .bst-toggle { transform: rotate(90deg); }

  .req-list {
    display: none;
    border-top: 1px solid var(--border);
  }
  .baustein-block.open .req-list { display: block; }

  .req-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .req-item:last-child { border-bottom: none; }
  .req-item:hover { background: rgba(255,255,255,0.02); }
  .req-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 100px;
    flex-shrink: 0;
  }
  .req-name {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  mark {
    background: rgba(79,142,247,0.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }
  .no-results svg { margin-bottom: 1rem; opacity: 0.3; }

  /* Category colors */
  .tag-APP { background: rgba(79,142,247,0.15); color: #7eb8ff; }
  .tag-CON { background: rgba(62,207,142,0.15); color: #3ecf8e; }
  .tag-DER { background: rgba(240,68,68,0.15); color: #f87171; }
  .tag-IND { background: rgba(245,166,35,0.15); color: #fbbf24; }
  .tag-INF { background: rgba(45,212,191,0.15); color: #2dd4bf; }
  .tag-ISMS { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .tag-NET { background: rgba(244,114,182,0.15); color: #f472b6; }
  .tag-OPS { background: rgba(251,191,36,0.15); color: #fcd34d; }
  .tag-ORP { background: rgba(52,211,153,0.15); color: #6ee7b7; }
  .tag-SYS { background: rgba(156,163,175,0.15); color: #9ca3af; }

  /* Sidebar category indicator colors match tags */
  .scat-APP .sidebar-code { color: #7eb8ff; }
  .scat-CON .sidebar-code { color: #3ecf8e; }
  .scat-DER .sidebar-code { color: #f87171; }
  .scat-IND .sidebar-code { color: #fbbf24; }
  .scat-INF .sidebar-code { color: #2dd4bf; }
  .scat-ISMS .sidebar-code { color: #a78bfa; }
  .scat-NET .sidebar-code { color: #f472b6; }
  .scat-OPS .sidebar-code { color: #fcd34d; }
  .scat-ORP .sidebar-code { color: #6ee7b7; }
  .scat-SYS .sidebar-code { color: #9ca3af; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1rem; }
    .site-header { padding: 1rem; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

const CATS = Object.keys(DATA).sort();

let activeCat = null;
let activeBst = null;

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  CATS.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'sidebar-cat';
    const catHeader = document.createElement('div');
    catHeader.className = 'sidebar-cat-header';
    catHeader.textContent = cat + ' — ' + (CAT_DESC[cat] || '');
    catDiv.appendChild(catHeader);
    Object.entries(DATA[cat]).forEach(([code, reqs]) => {
      const item = document.createElement('div');
      item.className = 'sidebar-item scat-' + cat;
      item.id = 'sb-' + code.replace(/\./g,'-');
      item.innerHTML = `<span class="sidebar-code">${code}</span><span class="sidebar-name">${BST_NAMES[code] || ''}</span><span class="sidebar-count">${reqs.length}</span>`;
      item.onclick = () => scrollToBst(code);
      catDiv.appendChild(item);
    });
    sb.appendChild(catDiv);
  });
}

function scrollToBst(code) {
  const el = document.getElementById('bst-' + code.replace(/\./g,'-'));
  if (el) {
    el.scrollIntoView({behavior:'smooth', block:'start'});
    el.classList.add('open');
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    const sb = document.getElementById('sb-' + code.replace(/\./g,'-'));
    if (sb) sb.classList.add('active');
  }
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const main = document.getElementById('main');
  main.innerHTML = '';
  let totalVis = 0;

  CATS.forEach(cat => {
    if (activeCat && activeCat !== cat) return;
    Object.entries(DATA[cat]).forEach(([code, reqs]) => {
      const filtReqs = q
        ? reqs.filter(r => r.id.toLowerCase().includes(q) || r.name.toLowerCase().includes(q) || code.toLowerCase().includes(q))
        : reqs;
      if (!filtReqs.length) return;
      totalVis += filtReqs.length;

      const block = document.createElement('div');
      block.className = 'baustein-block' + (q ? ' open' : '');
      block.id = 'bst-' + code.replace(/\./g,'-');

      const header = document.createElement('div');
      header.className = 'bst-header';
      header.innerHTML = `
        <span class="bst-cat-tag tag-${cat}">${cat}</span>
        <span class="bst-code">${hl(code, q)}</span>
        <span class="bst-title">${hl(BST_NAMES[code] || code, q)}</span>
        <span class="bst-count">${filtReqs.length} Anforderungen</span>
        <span class="bst-toggle">&#x276F;</span>
      `;
      header.onclick = () => block.classList.toggle('open');

      const list = document.createElement('div');
      list.className = 'req-list';
      filtReqs.forEach(r => {
        const item = document.createElement('div');
        item.className = 'req-item';
        item.innerHTML = `<span class="req-id">${hl(r.id, q)}</span><span class="req-name">${hl(r.name, q)}</span>`;
        list.appendChild(item);
      });

      block.appendChild(header);
      block.appendChild(list);
      main.appendChild(block);
    });
  });

  document.getElementById('s-vis').textContent = totalVis.toLocaleString('de-DE');
  document.getElementById('results-info') && (document.getElementById('results-info').textContent = '');

  if (!main.children.length) {
    main.innerHTML = `<div class="no-results">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Keine Anforderungen für <strong>"${q}"</strong> gefunden.</p>
    </div>`;
  }
}

function buildFilters() {
  const filters = document.getElementById('filters');
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-pill active';
  allBtn.textContent = 'Alle';
  allBtn.onclick = () => { activeCat = null; setActiveFilter(allBtn); render(); };
  filters.appendChild(allBtn);
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.textContent = cat + ' – ' + (CAT_DESC[cat] || '');
    btn.onclick = () => { activeCat = cat; setActiveFilter(btn); render(); };
    filters.appendChild(btn);
  });
}

function setActiveFilter(btn) {
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function onSearch() {
  const q = document.getElementById('search').value;
  document.getElementById('clearBtn').classList.toggle('visible', q.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  render();
}

// Intersection observer to highlight sidebar
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const code = e.target.id.replace('bst-','').replace(/-/g,'.');
      document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
      const sb = document.getElementById('sb-' + e.target.id.replace('bst-',''));
      if (sb) {
        sb.classList.add('active');
        sb.scrollIntoView({block:'nearest'});
      }
    }
  });
}, { threshold: 0.2 });

function observeBlocks() {
  document.querySelectorAll('.baustein-block').forEach(b => obs.observe(b));
}

buildFilters();
buildSidebar();
render();
setTimeout(observeBlocks, 100);
</script>
