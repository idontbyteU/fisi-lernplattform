};

/* ===== KARTEN ===== */
const CARDS=[
/* Kaufvertrag */
{c:"kv",q:"Was ist ein Kaufvertrag?",a:"Ein <b>mehrseitiges Rechtsgeschäft</b> auf Basis einer übereinstimmenden Willenserklärung zwischen zwei geschäftsfähigen Partnern – verpflichtet zur Übereignung einer Sache gegen Zahlung."},
{c:"kv",q:"Welche drei Freiheiten umfasst die Vertragsfreiheit (Art. 2 GG)?",a:"<b>Abschlussfreiheit</b> (ob/wann/mit wem), <b>Auflösungsfreiheit</b> (ob/wann), <b>Inhaltsfreiheit</b> (Inhalt/Umfang)."},
{c:"kv",q:"Bis zu welchem Alter ist man geschäftsunfähig?",a:"Bis zum <b>vollendeten 7. Lebensjahr</b> – ebenso dauerhaft krankhaft Geistesgestörte."},
{c:"kv",q:"Wer ist beschränkt geschäftsfähig und was gilt?",a:"Personen vom <b>8. bis zum vollendeten 18. Lebensjahr</b>. Geschäfte sind wirksam mit Zustimmung des gesetzlichen Vertreters (§ 106 BGB)."},
{c:"kv",q:"Was bedeutet „schwebend unwirksam“ (§ 108 BGB)?",a:"Das Geschäft eines beschränkt Geschäftsfähigen ist <b>bis zur Zustimmung/Genehmigung</b> des gesetzlichen Vertreters vorläufig unwirksam."},
{c:"kv",q:"Ab wann ist man unbeschränkt geschäftsfähig?",a:"Ab <b>18 Jahren</b> – volle Wirksamkeit ab Vertragsabschluss."},
{c:"kv",q:"Welche Formen der Willenserklärung gibt es?",a:"<b>Ausdrücklich</b> (mündlich/schriftlich/elektronisch), <b>stillschweigend/Schweigen</b> (z. B. Vertragsverlängerung) und <b>konkludent</b> (durch Handeln)."},
{c:"kv",q:"Nenne ein Beispiel für konkludentes Handeln.",a:"Handzeichen bei einer Auktion, in den Bus einsteigen, am Taxistand die Hand heben."},
{c:"kv",q:"Unterschied einseitiges und mehrseitiges Rechtsgeschäft?",a:"<b>Einseitig:</b> nur eine Willenserklärung (Kündigung, Testament). <b>Mehrseitig:</b> mind. zwei übereinstimmende Erklärungen (Kaufvertrag)."},
{c:"kv",q:"Was ist das Verpflichtungsgeschäft beim Kauf?",a:"Der Vertrag, der die <b>Pflichten</b> begründet: Verkäufer muss mangelfrei übergeben und übereignen, Käufer muss zahlen und annehmen."},
{c:"kv",q:"Was ist das Verfügungsgeschäft?",a:"Die tatsächliche <b>Erfüllung</b>: Übergabe der Sache und Zahlung. Danach kann jeder über das Erhaltene verfügen (Trennungsprinzip)."},
{c:"kv",q:"Unterschied Eigentum und Besitz?",a:"<b>Eigentum</b> = rechtliche Herrschaft über eine Sache. <b>Besitz</b> = tatsächliche (körperliche) Herrschaft. Beispiel: Mieter ist Besitzer, Vermieter Eigentümer."},
{c:"kv",q:"Was bedeutet Eigentumsvorbehalt?",a:"Die Ware bleibt <b>bis zur vollständigen Bezahlung Eigentum des Verkäufers</b>, obwohl der Käufer sie bereits besitzt."},
{c:"kv",q:"Kaufvertragsarten nach rechtlicher Stellung der Partner?",a:"<b>Bürgerlicher Kauf</b> (privat–privat), <b>einseitiger Handelskauf</b> (Unternehmer–privat), <b>zweiseitiger Handelskauf</b> (Unternehmer–Unternehmer)."},
{c:"kv",q:"Unterschied Stückkauf und Gattungskauf?",a:"<b>Stückkauf:</b> ganz bestimmte Ware/Unikat. <b>Gattungskauf:</b> Ware gleicher Güte/Qualität (austauschbar)."},
{c:"kv",q:"Wo ist der Erfüllungsort, wenn nichts vereinbart ist?",a:"Beim <b>Verkäufer</b>. Merke: Geldschuld = <b>Bringschuld</b>, Warenschuld = <b>Holschuld</b>."},
/* Störungen */
{c:"st",q:"Welche Störungen kann der Verkäufer verursachen?",a:"<b>Mangelhafte oder nicht geleistete Lieferung</b> sowie <b>Lieferverzug</b> (verspätete Lieferung)."},
{c:"st",q:"Welche Störungen kann der Käufer verursachen?",a:"<b>Zahlungsverzug</b> und <b>Annahmeverzug</b>."},
{c:"st",q:"Was zählt zu einer mangelhaften Lieferung?",a:"Beschädigte Ware, falsche Ware, falsche Menge, Mangel in der Beschaffenheit, Mangel bei der Montage."},
{c:"st",q:"Unterschied offener und versteckter Mangel?",a:"<b>Offen:</b> sofort erkennbar → unverzüglich anzeigen. <b>Versteckt:</b> erst später erkennbar → unverzüglich nach Entdeckung, spätestens innerhalb der Gewährleistungsfrist."},
{c:"st",q:"Wie lange ist die Gewährleistungsfrist in der Regel?",a:"<b>2 Jahre.</b>"},
{c:"st",q:"Welche Pflichten hat der Käufer (Unternehmer) bei Mängeln?",a:"<b>Prüfungspflicht</b> (unverzüglich nach Erhalt), <b>Rüge-/Anzeigepflicht</b> und <b>einstweilige Aufbewahrung</b> der Ware."},
{c:"st",q:"Welche Rechte hat der Käufer zuerst bei mangelhafter Lieferung?",a:"<b>Nacherfüllung</b>: Nachbesserung oder Ersatzlieferung mangelfreier Ware."},
{c:"st",q:"Welche Konsequenzen folgen, wenn die Nacherfüllung scheitert?",a:"<b>Minderung</b>, <b>Rücktritt</b> vom Vertrag oder <b>Schadenersatz</b>."},
{c:"st",q:"Wie oft darf der Verkäufer nachbessern?",a:"In der Regel <b>zweimal</b> innerhalb einer angemessenen Frist."},
{c:"st",q:"Wann liegt Lieferverzug vor?",a:"Wenn der vereinbarte <b>Liefertermin überschritten</b> ist – meist nach Mahnung und Setzen einer angemessenen Nachfrist."},
{c:"st",q:"Welche Rechte hat der Käufer bei Lieferverzug?",a:"Auf <b>Nachlieferung bestehen</b> oder nach Ablauf der Nachfrist <b>Rücktritt</b> / Schadenersatz."},
{c:"st",q:"Was bewirkt die Verjährung?",a:"Nach Fristablauf können <b>Ansprüche nicht mehr durchgesetzt</b> werden (Störung durch Zeitablauf)."},
/* Handelskalkulation */
{c:"hk",q:"Wozu dient die Handelskalkulation?",a:"Zur schrittweisen Ermittlung des <b>Verkaufspreises</b> aus dem Einkaufspreis (oder rückwärts) im Handel."},
{c:"hk",q:"Nenne das Grundschema der Vorwärtskalkulation.",a:"LEP −Rabatt→ ZEP −Skonto→ BEP +Bezugskosten→ <b>Einstandspreis</b> +Handlungskosten→ <b>Selbstkosten</b> +Gewinn→ <b>Barverkaufspreis</b> +Skonto/Provision→ ZVP +Rabatt→ <b>LVP netto</b> +USt→ <b>Bruttoverkaufspreis</b>."},
{c:"hk",q:"Vom Listeneinkaufspreis zum Zieleinkaufspreis?",a:"Listeneinkaufspreis <b>− Liefererrabatt</b> = Zieleinkaufspreis."},
{c:"hk",q:"Vom Zieleinkaufspreis zum Bareinkaufspreis?",a:"Zieleinkaufspreis <b>− Liefererskonto</b> = Bareinkaufspreis."},
{c:"hk",q:"Wie erhält man den Einstandspreis (Bezugspreis)?",a:"Bareinkaufspreis <b>+ Bezugskosten</b> = Einstandspreis / Bezugspreis."},
{c:"hk",q:"Was sind Bezugskosten?",a:"Kosten der Beschaffung: <b>Fracht, Rollgeld, Verpackung, Versicherung</b>."},
{c:"hk",q:"Wie erhält man den Selbstkostenpreis?",a:"Einstandspreis <b>+ Handlungskosten</b> (Gemeinkostenzuschlag) = Selbstkostenpreis."},
{c:"hk",q:"Was sind Handlungskosten?",a:"Die Betriebskosten für <b>Lagerung, Verwaltung, Vertrieb</b> usw. – als prozentualer Zuschlag berücksichtigt."},
{c:"hk",q:"Wie erhält man den Barverkaufspreis?",a:"Selbstkostenpreis <b>+ Gewinnzuschlag</b> = Barverkaufspreis."},
{c:"hk",q:"Wie kommt man zum Zielverkaufspreis?",a:"Barverkaufspreis <b>+ Kundenskonto + Vertreterprovision</b> (= Kalkulationsabschlag) = Zielverkaufspreis. Achtung: „im Hundert“ rechnen!"},
{c:"hk",q:"Warum rechnet man Skonto/Provision/Rabatt „im Hundert“?",a:"Weil sich diese Prozentsätze auf den <b>höheren Endpreis (100 %)</b> beziehen. Beispiel: Barverkaufspreis = (100 − Abschlag) % des Zielverkaufspreises."},
{c:"hk",q:"Vom Zielverkaufspreis zum Listenverkaufspreis (netto)?",a:"Zielverkaufspreis <b>+ Kundenrabatt</b> = Listenverkaufspreis netto (Rabatt „im Hundert“)."},
{c:"hk",q:"Wie kommt man zum Bruttoverkaufspreis?",a:"Listenverkaufspreis netto <b>+ Umsatzsteuer (19 %)</b> = Listenverkaufspreis brutto."},
{c:"hk",q:"Was ist die Bezugskalkulation?",a:"Der erste Teil der Kalkulation: vom <b>Listeneinkaufspreis bis zum Einstandspreis</b>."},
{c:"hk",q:"Was ist die Differenzkalkulation?",a:"Sind Einkaufs- und Verkaufspreis gegeben, ermittelt man den <b>Gewinn als Differenz</b>."},
{c:"hk",q:"Was ist die Rückwärtskalkulation?",a:"Vom vorgegebenen Verkaufspreis <b>rückwärts</b> rechnen, um den maximal zulässigen Einkaufspreis zu finden."},
{c:"hk",q:"Was ist der Kalkulationszuschlag?",a:"Aufschlag bezogen auf den Einstandspreis: <b>(Verkaufspreis − Einstand) ÷ Einstand × 100</b>."},
{c:"hk",q:"Was ist die Handelsspanne?",a:"Aufschlag bezogen auf den Verkaufspreis: <b>(Verkaufspreis − Einstand) ÷ Verkaufspreis × 100</b>."},
{c:"hk",q:"Was ist der Kalkulationsfaktor?",a:"<b>Verkaufspreis (netto) ÷ Einstandspreis</b> – schneller Multiplikator vom Einkauf zum Verkauf."},
/* Inventur */
{c:"inv",q:"Was ist eine Inventur?",a:"Die <b>mengen- und wertmäßige Erfassung</b> aller Vermögensgegenstände und Schulden zu einem Stichtag."},
{c:"inv",q:"Stichtagsinventur?",a:"Erfassung aller Bestände an <b>einem festen Datum</b> (meist 31.12.). + Übersichtlich, − hoher Aufwand an einem Tag."},
{c:"inv",q:"Verlegte Inventur?",a:"Bis zu <b>3 Monate vor</b> oder <b>2 Monate nach</b> dem Stichtag; Bestände werden auf den Stichtag um-/zurückgerechnet. Entlastet den Bilanzstichtag."},
{c:"inv",q:"Permanente Inventur?",a:"<b>Laufende Erfassung</b> übers Jahr (Warenwirtschaftssystem); mind. 1× jährlich körperliche Kontrolle. Kein Jahresend-Stress, braucht gute Software."},
{c:"inv",q:"Stichprobeninventur?",a:"Nur ein <b>Teil wird gezählt</b>, der Gesamtbestand statistisch hochgerechnet. Sehr zeitsparend, nur unter bestimmten Voraussetzungen erlaubt."},
{c:"inv",q:"Körperliche Inventur?",a:"<b>Zählen, Wiegen, Messen</b> der Bestände (z. B. Waren im Lager)."},
{c:"inv",q:"Buchinventur?",a:"Ermittlung aus <b>Belegen und Buchführung</b> (z. B. Forderungen, Bankguthaben)."},
{c:"inv",q:"Anlageninventur?",a:"Erfassung langfristiger Vermögenswerte über ein <b>Anlagenverzeichnis</b> (z. B. Maschinen, Fahrzeuge)."},
{c:"inv",q:"Merksatz zu den drei Fragen der Inventur?",a:"<b>Wann?</b> (Stichtag/verlegt/permanent) – <b>Umfang?</b> (vollständig/Stichprobe) – <b>Wie erfasst?</b> (körperlich/buchmäßig)."},
{c:"inv",q:"Unterschied Inventur, Inventar, Bilanz?",a:"<b>Inventur</b> = das Zählen (Tätigkeit). <b>Inventar</b> = das ausführliche Verzeichnis. <b>Bilanz</b> = die zusammengefasste Gegenüberstellung von Vermögen und Kapital."},
/* Rechtsformen */
{c:"rf",q:"Unterschied Personen- und Kapitalgesellschaft?",a:"<b>Personengesellschaft:</b> Gesellschafter haften persönlich (GbR, OHG, KG). <b>Kapitalgesellschaft:</b> eigene juristische Person, Haftung auf Kapital beschränkt (GmbH, UG, AG)."},
{c:"rf",q:"Einzelunternehmen – Kapital und Haftung?",a:"Eine Person, <b>kein Mindestkapital</b>, haftet <b>unbeschränkt</b> mit Geschäfts- und Privatvermögen."},
{c:"rf",q:"GbR – Eckdaten?",a:"Gesellschaft bürgerlichen Rechts: mind. 2 Gesellschafter, kein Mindestkapital, <b>unbeschränkte persönliche Haftung</b>. Für kleine, nicht-kaufmännische Tätigkeiten."},
{c:"rf",q:"OHG – Eckdaten?",a:"Offene Handelsgesellschaft: mind. 2 Gesellschafter, kein Mindestkapital; alle haften <b>unbeschränkt und gesamtschuldnerisch</b>, auch mit Privatvermögen."},
{c:"rf",q:"KG – welche zwei Gesellschaftertypen?",a:"<b>Komplementär</b> (Vollhafter, unbeschränkt) und <b>Kommanditist</b> (Teilhafter, nur mit Einlage)."},
{c:"rf",q:"Wie haften die Gesellschafter einer KG?",a:"<b>Komplementär:</b> unbeschränkt, auch mit Privatvermögen. <b>Kommanditist:</b> nur bis zur Höhe seiner Einlage."},
{c:"rf",q:"GmbH – Mindestkapital und Haftung?",a:"Mindeststammkapital <b>25.000 €</b> (mind. die Hälfte bei Gründung einzuzahlen). Haftung <b>auf das Gesellschaftsvermögen beschränkt</b>."},
{c:"rf",q:"UG (haftungsbeschränkt)?",a:"„Mini-GmbH“: Gründung ab <b>1 €</b> Stammkapital; muss jährlich einen Teil des Gewinns ansparen, bis 25.000 € erreicht sind → Umwandlung in GmbH möglich."},
{c:"rf",q:"AG – Mindestkapital?",a:"Aktiengesellschaft: Grundkapital mind. <b>50.000 €</b>, aufgeteilt in Aktien. Haftung auf das Gesellschaftsvermögen beschränkt."},
{c:"rf",q:"Organe der AG?",a:"<b>Vorstand</b> (Leitung), <b>Aufsichtsrat</b> (Kontrolle), <b>Hauptversammlung</b> (Aktionäre)."},
{c:"rf",q:"Organe der GmbH?",a:"<b>Geschäftsführer</b> (Leitung) und <b>Gesellschafterversammlung</b> (Beschlüsse)."},
{c:"rf",q:"Was ist eine GmbH & Co. KG?",a:"Eine KG, deren Komplementär (Vollhafter) eine <b>GmbH</b> ist → vereint Haftungsbeschränkung der GmbH mit der Struktur der KG."},
{c:"rf",q:"Vor- und Nachteil einer Kapitalgesellschaft?",a:"<b>Vorteil:</b> beschränkte Haftung, leichtere Kapitalbeschaffung. <b>Nachteil:</b> Mindestkapital, mehr Formalitäten und Publizitätspflichten."},
/* Streik & Tarif */
{c:"str",q:"Wer darf einen Streik initiieren?",a:"Nur eine <b>Gewerkschaft</b>. Ein nicht von der Gewerkschaft getragener (wilder) Streik ist unzulässig."},
{c:"str",q:"Wie wird ein Streik legitimiert?",a:"Durch eine <b>Urabstimmung</b> der Gewerkschaftsmitglieder mit i. d. R. <b>75 % Zustimmung</b>."},
{c:"str",q:"Was ist die Friedenspflicht?",a:"Während der Laufzeit eines Tarifvertrags darf <b>nicht gestreikt</b> werden; sie endet einige Wochen nach Vertragsende."},
{c:"str",q:"Was ist Tarifautonomie?",a:"Das Recht von Gewerkschaften und Arbeitgeberverbänden, Tarifverträge <b>ohne staatlichen Eingriff</b> selbst auszuhandeln."},
{c:"str",q:"Für wen gelten Tarifverträge zunächst?",a:"Nur für <b>tarifgebundene</b> Arbeitgeber und Beschäftigte (Gewerkschaftsmitglieder)."},
{c:"str",q:"Was ist eine Allgemeinverbindlicherklärung (§ 5 TVG)?",a:"Das Bundesarbeitsministerium kann einen Tarifvertrag für allgemeinverbindlich erklären → er gilt dann auch für <b>nicht tarifgebundene</b> Arbeitgeber/Beschäftigte des Geltungsbereichs."},
{c:"str",q:"Unterschied Lohn-/Gehaltstarif und Manteltarifvertrag?",a:"<b>Lohn-/Gehalts- (Rahmen-) tarif:</b> regelt die Vergütung. <b>Manteltarifvertrag:</b> regelt sonstige Arbeitsbedingungen (Urlaub, Arbeitszeit, Kündigungsfristen)."},
{c:"str",q:"Was ist ein Flächentarifvertrag?",a:"Ein für eine ganze <b>Branche/Region</b> abgeschlossener Tarifvertrag."},
{c:"str",q:"Was ist eine Aussperrung?",a:"Arbeitskampfmittel der <b>Arbeitgeber</b>: Beschäftigte werden vorübergehend von Arbeit und Lohn ausgeschlossen (Gegenstück zum Streik)."},
{c:"str",q:"Nenne typische Streikarten.",a:"Warnstreik, Schwerpunktstreik, Dienst nach Vorschrift, vollständige Arbeitseinstellung, wilder Streik (rechtswidrig)."},
{c:"str",q:"Bekommen Streikende Lohn?",a:"<b>Nein</b> – kein Lohnanspruch während der Teilnahme. Gewerkschaftsmitglieder erhalten <b>Streikgeld</b> von der Gewerkschaft."},
{c:"str",q:"Was muss jeder Arbeitskampf beachten?",a:"Den Grundsatz der <b>Verhältnismäßigkeit</b>; Streiks dürfen <b>keine politischen Ziele</b> verfolgen."},
/* Risiken */
{c:"risk",q:"Was versteht man unter (betrieblichem) Risiko?",a:"Die Gefahr, dass ein Ereignis <b>negativ vom geplanten Ergebnis abweicht</b> (Schaden, Verlust)."},
{c:"risk",q:"Vier Strategien im Umgang mit Risiken?",a:"<b>Vermeiden</b>, <b>Vermindern</b>, <b>Überwälzen</b> (z. B. Versicherung) und <b>selbst tragen</b> (akzeptieren)."},
{c:"risk",q:"Beispiel für Risikoüberwälzung?",a:"Abschluss einer <b>Versicherung</b> (Betriebshaftpflicht, Elektronikversicherung) oder Auslagerung an einen Dienstleister."},
{c:"risk",q:"Was ist Risikomanagement?",a:"Der systematische Prozess: Risiken <b>identifizieren, bewerten</b> (Eintrittswahrscheinlichkeit × Schadenshöhe), <b>steuern und überwachen</b>."},
{c:"risk",q:"Typische IT-/Betriebsrisiken?",a:"Datenverlust, Systemausfall, Cyberangriffe, Lieferantenausfall, Fehlkalkulation, Forderungsausfall."},
/* Prozesse & Güter */
{c:"proz",q:"Was bedeutet Wertschöpfung?",a:"Durch Einsatz von Ressourcen (Arbeit, Kapital, Wissen, Technik, Zeit) den <b>Wert</b> eines Gutes/einer Leistung erhöhen → Mehrwert, für den der Kunde zahlt."},
{c:"proz",q:"Unterschied Geschäfts- und Wertschöpfungsprozess?",a:"<b>Geschäftsprozess:</b> jeder strukturierte Ablauf. <b>Wertschöpfungsprozess:</b> schafft direkten Kundennutzen. Jeder Wertschöpfungsprozess ist ein Geschäftsprozess – aber nicht umgekehrt."},
{c:"proz",q:"Kern-, Unterstützungs- und Führungsprozesse?",a:"<b>Kern:</b> direkter Kundennutzen/Umsatz (Servereinrichtung). <b>Unterstützung:</b> stützt die Kernprozesse (Buchhaltung, Einkauf). <b>Führung:</b> steuert strategisch (Budget-, Risikomanagement)."},
{c:"proz",q:"Die klassischen Produktionsfaktoren?",a:"<b>Boden, Arbeit, Kapital</b> – in der IT ergänzt um <b>Wissen</b> und <b>Technologie</b>."},
{c:"proz",q:"Welche Produktionsfaktoren sind in der IT besonders wichtig?",a:"<b>Wissen</b> und <b>Technologie</b> – die IT ist wissensintensiv und entwickelt sich ständig weiter."},
{c:"proz",q:"Unterschied materielle und immaterielle Güter?",a:"<b>Materiell:</b> physisch greifbar (PC, Server, Kabel). <b>Immateriell:</b> nicht greifbar (Software, Lizenzen)."},
{c:"proz",q:"Was ist eine Dienstleistung?",a:"Eine <b>immaterielle Leistung</b> zur Bedürfnisbefriedigung (Beratung, Support, Wartung) – nicht lagerbar."},
{c:"proz",q:"Was sind Organisationsmittel?",a:"Hilfsmittel zur Organisation der Arbeit, z. B. <b>Ticketsystem</b>, Formulare, Software zur Ablauforganisation."}
];
CARDS.forEach((c,i)=>c.id="c"+i);

/* ===== STATE ===== */
const LS="lf1_cards_v1";
let store; try{store=JSON.parse(localStorage.getItem(LS))||{}}catch(e){store={}}
store.known=store.known||{};
function save(){try{localStorage.setItem(LS,JSON.stringify(store))}catch(e){}}

let activeCat="alle", onlyOpen=false, shuffled=false, mode="lern";
let deck=[], pos=0, flipped=false;

/* ===== CHIPS ===== */
const chipsEl=document.getElementById('chips');
function count(cat){return CARDS.filter(c=>cat==="alle"||c.c===cat).length;}
function buildChips(){
  chipsEl.innerHTML="";
  const all=document.createElement('button');
  all.className="chip"+(activeCat==="alle"?" on":"");
  all.innerHTML='Alle<span class="ct">'+CARDS.length+'</span>';
  all.onclick=()=>{activeCat="alle";buildChips();rebuild();};
  chipsEl.appendChild(all);
  Object.keys(CATS).forEach(k=>{
    const c=document.createElement('button');
    c.className="chip"+(activeCat===k?" on":"");
    c.innerHTML=CATS[k].label+'<span class="ct">'+count(k)+'</span>';
    if(activeCat===k){c.style.background=CATS[k].color;c.style.borderColor=CATS[k].color;}
    c.onclick=()=>{activeCat=k;buildChips();rebuild();};
    chipsEl.appendChild(c);
  });
}

/* ===== DECK ===== */
function baseDeck(){
  let d=CARDS.filter(c=>activeCat==="alle"||c.c===activeCat);
  if(onlyOpen) d=d.filter(c=>!store.known[c.id]);
  return d;
}
function rebuild(){
  deck=baseDeck();
  if(shuffled){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}}
  pos=0;flipped=false;
  updateProg();
  if(mode==="lern")renderStudy();else renderList();
}
function updateProg(){
  const scope=CARDS.filter(c=>activeCat==="alle"||c.c===activeCat);
  const k=scope.filter(c=>store.known[c.id]).length;
  document.getElementById('ptot').textContent=scope.length;
  document.getElementById('pnum').textContent=k;
  document.getElementById('pfill').style.width=(scope.length?k/scope.length*100:0)+"%";
}

/* ===== STUDY ===== */
const studyEl=document.getElementById('study');
function renderStudy(){
  if(deck.length===0){
    studyEl.innerHTML='<div class="done-msg"><div class="em">🎉</div><h3>Alles gewusst!</h3><p>In dieser Auswahl sind keine offenen Karten mehr. Schalte „Nur offene“ aus oder setze zurück.</p><button class="tbtn" onclick="document.getElementById(\'tReset\').click()">Zurücksetzen</button></div>';
    return;
  }
  if(pos>=deck.length)pos=deck.length-1;
  const card=deck[pos];const cat=CATS[card.c];
  studyEl.innerHTML=`
    <div class="counter">Karte <b>${pos+1}</b> / ${deck.length}${store.known[card.id]?' · ✓ gewusst':''}</div>
    <div class="flash${flipped?' flip':''}" id="flash">
      <div class="flash-inner">
        <div class="face">
          <div class="f-cat" style="color:${cat.color}">${cat.label}</div>
          <div class="f-q">${card.q}</div>
          <div class="f-hint">Klick / Leertaste zum Umdrehen</div>
        </div>
        <div class="face b">
          <div class="f-lbl">Antwort</div>
          <div class="f-a">${card.a}</div>
          <div class="f-hint">Wusstest du es?</div>
        </div>
      </div>
    </div>
    <div class="ans-btns">
      <button class="again" id="bAgain">✗ Nochmal</button>
      <button class="known" id="bKnown">✓ Gewusst</button>
    </div>
    <div class="nav">
      <button id="bPrev">← Zurück</button>
      <span>${pos+1} / ${deck.length}</span>
      <button id="bNext">Weiter →</button>
    </div>`;
  document.getElementById('flash').onclick=()=>{flipped=!flipped;document.getElementById('flash').classList.toggle('flip',flipped);};
  document.getElementById('bAgain').onclick=()=>{delete store.known[card.id];save();next();};
  document.getElementById('bKnown').onclick=()=>{store.known[card.id]=true;save();next();};
  document.getElementById('bPrev').onclick=()=>{if(pos>0){pos--;flipped=false;renderStudy();}};
  document.getElementById('bNext').onclick=()=>next();
}
function next(){updateProg();if(pos<deck.length-1){pos++;flipped=false;renderStudy();}else{if(onlyOpen){rebuild();}else{pos=deck.length;renderStudy2done();}}}
function renderStudy2done(){
  studyEl.innerHTML='<div class="done-msg"><div class="em">✅</div><h3>Durch den Stapel!</h3><p>Du hast alle Karten dieser Auswahl einmal gesehen.</p><button class="tbtn" onclick="(function(){flippedReset()})()" id="bRestart">Nochmal von vorn</button></div>';
  document.getElementById('bRestart').onclick=()=>{pos=0;flipped=false;renderStudy();};
}
function flippedReset(){pos=0;flipped=false;renderStudy();}

/* ===== LIST ===== */
const listEl=document.getElementById('listView');
function renderList(){
  const d=CARDS.filter(c=>activeCat==="alle"||c.c===activeCat);
  listEl.innerHTML="";
  d.forEach(card=>{
    const cat=CATS[card.c];const k=!!store.known[card.id];
    const row=document.createElement('div');
    row.className="li"+(k?" k":"");
    row.innerHTML=`
      <input type="checkbox" class="li-chk" ${k?"checked":""} title="gewusst">
      <div class="li-x">
        <div class="li-cat" style="color:${cat.color}">${cat.label}</div>
        <div class="li-q">${card.q}</div>
        <div class="li-a">${card.a}</div>
        <span class="li-toggle">Antwort zeigen ▾</span>
      </div>`;
    const tog=row.querySelector('.li-toggle');
    tog.onclick=()=>{row.classList.toggle('open');tog.textContent=row.classList.contains('open')?"Antwort verbergen ▴":"Antwort zeigen ▾";};
    const chk=row.querySelector('.li-chk');
    chk.onchange=()=>{if(chk.checked)store.known[card.id]=true;else delete store.known[card.id];save();row.classList.toggle('k',chk.checked);updateProg();};
    listEl.appendChild(row);
  });
}

/* ===== CONTROLS ===== */
document.getElementById('tShuffle').onclick=function(){shuffled=!shuffled;this.classList.toggle('on',shuffled);rebuild();};
document.getElementById('tOpen').onclick=function(){onlyOpen=!onlyOpen;this.classList.toggle('on',onlyOpen);rebuild();};
document.getElementById('tReset').onclick=function(){
  const scope=CARDS.filter(c=>activeCat==="alle"||c.c===activeCat);
  scope.forEach(c=>delete store.known[c.id]);save();rebuild();
};
document.getElementById('mLern').onclick=()=>{mode="lern";document.getElementById('mLern').classList.add('on');document.getElementById('mList').classList.remove('on');studyEl.style.display="";listEl.style.display="none";rebuild();};
document.getElementById('mList').onclick=()=>{mode="list";document.getElementById('mList').classList.add('on');document.getElementById('mLern').classList.remove('on');studyEl.style.display="none";listEl.style.display="";rebuild();};

/* keyboard */
document.addEventListener('keydown',e=>{
  if(mode!=="lern"||deck.length===0)return;
  if(e.code==="Space"){e.preventDefault();flipped=!flipped;const f=document.getElementById('flash');if(f)f.classList.toggle('flip',flipped);}
  else if(e.code==="ArrowRight")next();
  else if(e.code==="ArrowLeft"){if(pos>0){pos--;flipped=false;renderStudy();}}
});

/* INIT */
buildChips();rebuild();
</script>
</body>
</html>
